services:
  postgres:
    image: postgres:16-alpine
    container_name: dashly_postgres
    restart: always
    profiles: ["local-db"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dashly_db}
      POSTGRES_USER: ${POSTGRES_USER:-dashly_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    mem_limit: 512m
    networks:
      - dashly-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${POSTGRES_DB:-dashly_db} -U ${POSTGRES_USER:-dashly_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dashly_redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    mem_limit: 160m
    networks:
      - dashly-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: dashly_mosquitto
    restart: always
    ports:
      - "127.0.0.1:1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    mem_limit: 64m
    networks:
      - dashly-network

networks:
  dashly-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
