services:
  app:
    build:
      context: .
    restart: unless-stopped
    init: true
    env_file: .env
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
    ports:
      - '127.0.0.1:3000:3000'
    depends_on:
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    mem_limit: 768m
    cpus: 1.0
    security_opt:
      - no-new-privileges:true
    networks:
      - dashly-network

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - 'yes'
      - --appendfsync
      - everysec
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - noeviction
      - --loglevel
      - warning
    volumes:
      - redis_data:/data
    mem_limit: 160m
    cpus: 0.5
    security_opt:
      - no-new-privileges:true
    networks:
      - dashly-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  mosquitto:
    image: eclipse-mosquitto:2.0.22
    restart: unless-stopped
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    mem_limit: 64m
    cpus: 0.25
    security_opt:
      - no-new-privileges:true
    networks:
      - dashly-network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mosquitto_sub -h 127.0.0.1 -t $$SYS/broker/version -C 1 -W 3 >/dev/null 2>&1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

networks:
  dashly-network:
    driver: bridge

volumes:
  redis_data:
  mosquitto_data:
  mosquitto_log:
