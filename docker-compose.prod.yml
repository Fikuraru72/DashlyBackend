services:
  app:
    build: .
    container_name: dashly_backend
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
    volumes:
      - ./.env:/app/.env:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - redis
      - mosquitto
    mem_limit: 768m
    networks:
      - dashly-network

  redis:
    image: redis:7-alpine
    container_name: dashly_redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    mem_limit: 160m
    networks:
      - dashly-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: dashly_mosquitto
    restart: always
    ports:
      - "127.0.0.1:1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    mem_limit: 64m
    networks:
      - dashly-network

networks:
  dashly-network:
    driver: bridge

volumes:
  redis_data:
