name: Backend image

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: backend-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: voidzero-dev/setup-vp@v1.9.0
        with:
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp check
      - run: vp run build
      - run: vp test

  publish:
    if: github.event_name != 'pull_request'
    needs: verify
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: docker/setup-buildx-action@v4.2.0
      - uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/dashly-backend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=tag
      - uses: docker/build-push-action@v7.3.0
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
      - name: Deploy Dokploy Compose
        if: github.ref == 'refs/heads/master'
        env:
          DOKPLOY_DEPLOY_WEBHOOK: ${{ secrets.DOKPLOY_DEPLOY_WEBHOOK }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if [ -z "$DOKPLOY_DEPLOY_WEBHOOK" ]; then
            echo "Dokploy webhook is not configured; skipping deployment."
            exit 0
          fi

          jq -n \
            --arg ref "$GITHUB_REF" \
            --arg sha "$GITHUB_SHA" \
            --arg message "$COMMIT_MESSAGE" \
            '{ref: $ref, head_commit: {id: $sha, message: $message}, commits: []}' \
            | curl --fail-with-body --request POST \
                "$DOKPLOY_DEPLOY_WEBHOOK" \
                --header 'Content-Type: application/json' \
                --header 'x-github-event: push' \
                --data-binary @-
